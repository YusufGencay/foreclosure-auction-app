# Florida Foreclosure Auction Portal Configuration
# Verified via WebSearch/WebFetch on 2026-07-03. All 14 URLs resolved live and
# were cross-checked against official county clerk websites. Most RealAuction
# (realforeclose.com / realtaxdeed.com) pages are JS single-page apps, so a
# plain HTTP fetch confirms the domain/site is live and correctly identified,
# but does not render the auction calendar itself (see backend/scrapers notes).
# platform values: realforeclose | realtaxdeed | grantstreet_clerkauction | other | unknown

counties:
  - county: Hillsborough
    region: Tampa Bay
    platform: realforeclose
    portal_url: https://hillsborough.realforeclose.com
    verified: true
    notes: "Confirmed live (RealAuction). JS SPA, minimal static HTML. Official per hillsclerk.com."

  - county: Pinellas
    region: Tampa Bay
    platform: realforeclose
    portal_url: https://pinellas.realforeclose.com
    verified: true
    notes: "CORRECTED 2026-07-13: was pointing at pinellas.realtaxdeed.com (tax deed), which live-checked via a real browser has ZERO scheduled sales in July or August 2026 - not a scraper bug, the calendar is genuinely empty (confirmed by paging through both months, no TD/FC markers on any date). Meanwhile pinellas.realforeclose.com (mortgage foreclosure) is a fully active RealAuction calendar with real scheduled sales throughout July 2026 (e.g. 11/11 FC on 07/30/2026, 6/7 FC on 07/14/2026) - confirmed live. Switched primary portal to realforeclose.com so real, current auction volume is actually captured; pinellas.realtaxdeed.com remains official per mypinellasclerk.gov but had nothing to scrape as of this check."

